name: Simple Cluster
id: simple-cluster
vibversion: 1.1.0

stages:
- id: build
  base: ghcr.io/vanilla-os/core:main
  addincludes: true
  singlelayer: false
  labels:
    maintainer: Tichael
  args:
    DEBIAN_FRONTEND: noninteractive

  # Commands to run first before building the modules
  runs:
    commands:
      - echo 'APT::Install-Recommends "1";' > /etc/apt/apt.conf.d/01norecommends

  modules:
  - name: init-setup
    type: shell
    commands:
    - apt-get update

  # Put your custom actions below this comment

  - name: purge-desktop-bloat
    type: shell
    commands:
    # Remove abstraction tools, audio stack, semantic search, bluetooth, modems, and desktop VPNs
    - apt-get purge -y distrobox apx vso pipewire pipewire-pulse wireplumber alsa-utils tinysparql \
      bluez bluez-obexd modemmanager wpasupplicant wireless-tools \
      network-manager-openvpn network-manager-l2tp network-manager-openconnect \
      network-manager-ssh network-manager-vpnc || true
    - apt-get autoremove -y

  - name: setup-proxmox-repo
    type: shell
    commands:
    # Add Proxmox repo for DRBD 9 and LINSTOR
    - wget -qO /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
    - echo "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription" > /etc/apt/sources.list.d/proxmox.list
    - apt-get update

  - name: install-hyperconverged-stack
    type: apt
    sources:
      - packages:
        # Docker Swarm
        - docker.io
        - docker-compose-plugin
        # VM Stack
        - qemu-kvm
        - libvirt-daemon-system
        - libvirt-clients
        - bridge-utils
        # Networking HA
        - keepalived
        # Storage (dkms will auto-compile against the existing linux-headers)
        - drbd-utils
        - linstor-client
        - drbd-dkms
        # Utilities
        - curl
        - jq

  - name: enable-system-services
    type: shell
    commands:
    # Ensure critical daemons start automatically
    - systemctl enable docker.service
    - systemctl enable libvirtd.service
    - systemctl enable keepalived.service

  - name: vanilla-tools
    type: shell
    sources:
      - type: tar
        url: https://github.com/Vanilla-OS/vanilla-tools/releases/download/v1.0.1/vanilla-tools-amd64.tar.gz
        checksum: aef32f07820e0993e534e6bccfa1a6daae6c8c6f0543d3e073f4f121f2ef2e31
    commands:
    - mkdir -p /usr/bin
    - cp /sources/vanilla-tools/vanilla-tools*/vanilla-tools/lpkg /usr/bin/lpkg
    - chmod +x /usr/bin/lpkg

  # Put your custom actions above this comment

  - name: set-image-name-abroot
    type: includes
    includes:
      - modules/80-set-image-abroot-config.yml

  - name: cleanup
    type: shell
    commands:
    - apt-get autoremove -y
    - apt-get clean
    - lpkg --lock

  - name: fsguard
    type: fsguard
    CustomFsGuard: false
    FsGuardLocation: "/usr/sbin/FsGuard"
    GenerateKey: true
    FilelistPaths: ["/usr/bin"]
    modules:
      - name: remove-prev-fsguard
        type: shell
        commands:
          - rm -rf /FsGuard 
          - rm -f ./minisign.pub ./minisign.key 
          - chmod +x /usr/sbin/init

  - name: cleanup2
    type: shell
    commands:
      - rm -rf /tmp/*
      - rm -rf /var/tmp/*
